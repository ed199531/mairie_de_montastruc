    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3f8f6a"/><stop offset="1" stop-color="#2f7d5b"/></linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#sky)"/>
  <circle cx="660" cy="110" r="46" fill="#f6c14b" opacity=".9"/>
  <!-- collines lointaines -->
