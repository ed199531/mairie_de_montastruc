    <rect x="540" y="330" width="86" height="90" fill="#c96a4b"/><path d="M532 330 l51-34 51 34z" fill="#9c3b25"/>
    <g fill="#0d3b54" opacity=".65"><rect x="140" y="356" width="18" height="22"/><rect x="172" y="356" width="18" height="22"/><rect x="262" y="344" width="18" height="24"/><rect x="292" y="344" width="18" height="24"/><rect x="560" y="356" width="18" height="22"/><rect x="592" y="356" width="18" height="22"/></g>
  </g>
